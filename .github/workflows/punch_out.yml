name: Auto Punch OUT

on:
  schedule:
    # 07:00 PM IST = 13:30 PM UTC
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

jobs:
  punch_out:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run Punch Out Script
        env:
          PUNCH_USERNAME: 'varun.singh@telesys.com'
          PUNCH_PASSWORD: ${{ secrets.PUNCH_PASSWORD }} # Save your password in GitHub Secrets for safety, otherwise it will use default
          PUNCH_ACTION: 'out'
        run: python script.py

      - name: Upload Screenshot Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard_screenshot
          path: dashboard_screenshot.png

      - name: Notify MS Teams
        if: always() && secrets.TEAMS_WEBHOOK_URL != ''
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="Punch OUT workflow completed. Download screenshot artifact from this run: ${RUN_URL}"
          curl -H "Content-Type: application/json" \
            -d "{\"text\": \"${MESSAGE}\"}" \
            "$TEAMS_WEBHOOK_URL"
